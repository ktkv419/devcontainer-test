services:
  web:
    image: nginx
    volumes:
    - ./frontend:/etc/nginx/templates
    ports:
    - "8080:80"
    environment:
    #  - NGINX_HOST=foobar.com
    - NGINX_PORT=80
  backend:
    container_name: backend
    build: ./backend/.
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - sqlite_data:/backend/database.db

volumes:
  sqlite_data: